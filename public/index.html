<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mac Remote Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #16213e;
      border-radius: 16px;
      padding: 40px;
      width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      margin-bottom: 32px;
      font-size: 1.4em;
      color: #e2e2e2;
    }
    .service {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid #1a1a3e;
    }
    .service:last-child { border-bottom: none; }
    .service-info h2 { font-size: 1em; margin-bottom: 4px; }
    .service-info p { font-size: 0.8em; color: #888; }
    .toggle {
      position: relative;
      width: 52px;
      height: 28px;
      cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 28px;
      transition: background 0.3s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    .toggle input:checked + .slider { background: #0f9d58; }
    .toggle input:checked + .slider::before { transform: translateX(24px); }
    .toggle input:disabled + .slider { opacity: 0.5; cursor: not-allowed; }
    .status-bar {
      margin-top: 24px;
      padding: 12px;
      border-radius: 8px;
      background: #1a1a2e;
      font-size: 0.85em;
      text-align: center;
      color: #aaa;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .status-bar.error { color: #f44; }
    .status-bar.success { color: #0f9d58; }
  </style>
</head>
<body>
  <div class="container">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:32px">
      <h1 style="margin:0">Mac Remote Control</h1>
      <button onclick="logout()" style="background:none;border:1px solid #555;color:#aaa;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:0.8em">Logout</button>
    </div>

    <div class="service">
      <div class="service-info">
        <h2>SSH (Remote Login)</h2>
        <p>Opens port 22 for SSH access</p>
      </div>
      <label class="toggle">
        <input type="checkbox" id="ssh-toggle" disabled>
        <span class="slider"></span>
      </label>
    </div>

    <div class="service">
      <div class="service-info">
        <h2>File Sharing (SMB)</h2>
        <p>Enables network filesystem access</p>
      </div>
      <label class="toggle">
        <input type="checkbox" id="fs-toggle" disabled>
        <span class="slider"></span>
      </label>
    </div>

    <div class="status-bar" id="status">Loading…</div>
  </div>

  <script>
    const sshToggle = document.getElementById('ssh-toggle');
    const fsToggle = document.getElementById('fs-toggle');
    const statusBar = document.getElementById('status');

    function setStatus(msg, type = '') {
      statusBar.textContent = msg;
      statusBar.className = 'status-bar' + (type ? ` ${type}` : '');
    }

    async function fetchStatus() {
      sshToggle.disabled = true;
      fsToggle.disabled = true;
      setStatus('Loading…');
      try {
        const res = await fetch('/api/status');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        sshToggle.checked = data.ssh.enabled;
        fsToggle.checked = data.fileSharing.enabled;
        sshToggle.disabled = false;
        fsToggle.disabled = false;
        setStatus('Connected', 'success');
      } catch (err) {
        setStatus('Failed to fetch status: ' + err.message, 'error');
      }
    }

    async function toggle(endpoint, enable, toggleEl) {
      toggleEl.disabled = true;
      setStatus('Updating…');
      try {
        const res = await fetch(`/api/${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enable }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        sshToggle.checked = data.status.ssh.enabled;
        fsToggle.checked = data.status.fileSharing.enabled;
        setStatus(
          `${endpoint === 'ssh' ? 'SSH' : 'File Sharing'} ${enable ? 'enabled' : 'disabled'}`,
          data.result.success ? 'success' : 'error'
        );
      } catch (err) {
        setStatus('Error: ' + err.message, 'error');
        fetchStatus(); // refresh to get actual state
      } finally {
        toggleEl.disabled = false;
      }
    }

    async function logout() {
      await fetch('/logout', { method: 'POST' });
      window.location.reload();
    }

    sshToggle.addEventListener('change', () =>
      toggle('ssh', sshToggle.checked, sshToggle));
    fsToggle.addEventListener('change', () =>
      toggle('file-sharing', fsToggle.checked, fsToggle));

    fetchStatus();
  </script>
</body>
</html>
